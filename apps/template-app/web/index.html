<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview</title>
    <style>
      /* Browser-only stand-ins for the iOS-exclusive fonts so the preview shows
         them instead of falling back. The real iPhone uses the genuine iOS fonts
         (these @font-face rules don't exist on device). */
      @font-face { font-family: "Helvetica Neue"; src: url("/fonts/inter.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Palatino"; src: url("/fonts/lora.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Avenir Next"; src: url("/fonts/mulish.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Menlo"; src: url("/fonts/roboto-mono.woff2") format("woff2"); font-display: swap; }

      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      #root {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      /* Bound the RN view tree to the viewport so the screen's ScrollView
         scrolls internally and the bottom tab bar stays pinned (matching iOS).
         Mirrors Yoga's default min-height:0; only affects elements without an
         explicit inline min-height, so 44pt touch targets etc. are preserved. */
      #root * {
        min-height: 0;
      }
      /* Hide scrollbars in the preview so it reads like a real phone screen
         (iOS overlays a transient bar; browsers show a persistent one). */
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
