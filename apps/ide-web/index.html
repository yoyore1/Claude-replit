<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appable — turn your idea into a real app</title>
    <!-- Load Inter without blocking render or the preview's network-idle. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;550;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Stand-ins for the iOS-exclusive fonts so the font-picker previews render
         them (same faces the phone preview uses). -->
    <style>
      @font-face { font-family: "Helvetica Neue"; src: url("/fonts/inter.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Palatino"; src: url("/fonts/lora.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Avenir Next"; src: url("/fonts/mulish.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "Menlo"; src: url("/fonts/roboto-mono.woff2") format("woff2"); font-display: swap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
